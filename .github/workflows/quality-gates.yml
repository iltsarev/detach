name: Quality gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: macos-26
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore Swift and tmux caches
        uses: actions/cache@v4
        with:
          path: |
            app/.build
          key: detach-${{ runner.os }}-${{ runner.arch }}-xcode-26.6-${{ hashFiles('app/Package.resolved', 'scripts/build-tmux.sh') }}-${{ github.sha }}
          restore-keys: |
            detach-${{ runner.os }}-${{ runner.arch }}-xcode-26.6-${{ hashFiles('app/Package.resolved', 'scripts/build-tmux.sh') }}-
            detach-${{ runner.os }}-${{ runner.arch }}-xcode-26.6-
      - name: Run pull-request change gate
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: scripts/quality-gate --base "$BASE_SHA"
      - name: Run full repository gate
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: scripts/quality-gate --mode repository --keep-going
      - name: Publish gate summary
        if: always()
        shell: bash
        run: |
          runs=(app/build/quality-gates/*)
          if [ ! -f "${runs[0]}/summary.tsv" ]; then
            printf '## Quality gate\n\nNo evidence was produced.\n' >>"$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          latest="${runs[${#runs[@]}-1]}"
          {
            printf '## Quality gate evidence\n\n'
            if [ -f "$latest/summary.md" ]; then
              cat "$latest/summary.md"
            else
              printf '```text\n'
              cat "$latest/manifest.tsv"
              printf '\n'
              cat "$latest/summary.tsv"
              printf '```\n'
            fi
          } >>"$GITHUB_STEP_SUMMARY"
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: app/build/quality-gates
          if-no-files-found: ignore
          retention-days: 14
